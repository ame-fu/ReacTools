about:
  content: >
    # 关于 ReacTools ✨

    **ReacTools** 是基于原始 [IT-Tools](https://it-tools.ywsj.eu.org/) 的
    **React/Next.js 移植版**。在尽量保持原有功能与体验的前提下，
    使用 **TypeScript**、**React 19** 和 **Ant Design** 重新实现。

    布局支持 **响应式**：左侧菜单与右侧内容独立滚动、固定顶栏、
    移动端全屏滑动菜单。

    ## 技术栈 ⚙️

    - Next.js + React 19
    - TypeScript
    - Ant Design
    - 基于 YAML 的 i18n（构建时生成）

    工具逻辑参考原版 Vue IT-Tools，针对 React 生态重新实现。

    原项目链接：https://it-tools.ywsj.eu.org/

