about:
  content: >
    # About ReacTools ✨

    **ReacTools** is a **React/Next.js** port of the original
    [IT-Tools](https://it-tools.ywsj.eu.org/) application. All features are
    kept as close as possible to the original experience, built with
    **TypeScript**, **React 19**, and **Ant Design**.

    The layout focuses on **responsive design**, independent scrolling
    between the sidebar and content, a fixed top bar, and a full-screen
    sliding menu on mobile.

    ## Technologies ⚙️

    - Next.js + React 19
    - TypeScript
    - Ant Design
    - YAML-based i18n (generated at build time)

    Tool logic is inspired by the original Vue IT-Tools, reimplemented
    for the React ecosystem.

    Original project: https://it-tools.ywsj.eu.org/

    And if you found a bug, or something doesn't work as expected, please file a bug report in the [issues section](https://github.com/CorentinTh/it-tools/issues/new/choose) in the GitHub repository.

