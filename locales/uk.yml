about:
  content: >
    # Про ReacTools ✨

    **ReacTools** — це **React/Next.js-порт** оригінального застосунку
    [IT-Tools](https://it-tools.ywsj.eu.org/). Ми намагаємось зберегти
    функціональність та досвід використання як в оригіналі, але на базі
    сучасного стеку з **TypeScript**, **React 19** та **Ant Design**.

    Інтерфейс був перероблений з акцентом на **адаптивний дизайн**:
    незалежне прокручування бічного меню та основного контенту, фіксована
    верхня панель та повноекранне меню на мобільних пристроях.

    ## Технології ⚙️

    - Next.js + React 19
    - TypeScript
    - Компоненти Ant Design
    - i18n на основі YAML-файлів, що генеруються під час збірки

    Логіка інструментів натхненна оригінальною Vue-версією IT-Tools,
    але перевтілена під екосистему React.

    Оригінальний проєкт: https://it-tools.ywsj.eu.org/

