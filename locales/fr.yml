about:
  content: >
    # À propos de ReacTools ✨

    **ReacTools** est un **port React/Next.js** de l’application originale
    [IT-Tools](https://it-tools.ywsj.eu.org/). L’objectif est de conserver
    au maximum les fonctionnalités et l’expérience d’origine, tout en
    modernisant la pile avec **TypeScript**, **React 19** et **Ant Design**.

    L’interface a été repensée avec un accent sur le **responsive design** :
    défilement indépendant entre le menu latéral et le contenu, barre
    supérieure fixe, et menu plein écran sur mobile pour une meilleure
    ergonomie.

    ## Technologies ⚙️

    - Next.js + React 19
    - TypeScript
    - Composants Ant Design
    - i18n basé sur des fichiers YAML, généré au build

    La logique des outils s’inspire de la version Vue originale d’IT-Tools,
    mais est réimplémentée pour l’écosystème React.

    Projet original : https://it-tools.ywsj.eu.org/

