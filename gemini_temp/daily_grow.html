<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap');
        
        /* 黄金双字体系统：Grotesk 用于几何建筑美感，Plus Jakarta Sans 用于极致的文本阅读舒适度 */
        body {
            font-family: 'Plus Jakarta Sans', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #ECEBE6; /* Calming oatmeal gallery-wall background */
            color: #1A1A1A;
            line-height: 1.625;
        }

        /* Architectural numerals and header typography */
        .font-accent {
            font-family: 'Space Grotesk', sans-serif;
        }

        /* Hide Scrollbar for ultra-clean gallery aesthetic */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Tactile Mondrian Flat Lowering effect - completely rectangular active states */
        .card-tap {
            transition: transform 0.1s ease, background-color 0.15s ease, color 0.15s ease;
        }
        .card-tap:active {
            transform: translate(1.5px, 1.5px);
            box-shadow: 2px 2px 0px 0px #1A1A1A !important;
        }

        /* Premium Morandi Muted Color Palettes (Rich, low-saturation, high-end feel) */
        /* Preset 0: Muted Terracotta Red */
        .preset-0 { background-color: #FDFDFD; color: #1A1A1A; border: 1.5px solid #1A1A1A; }
        .preset-0.checked { background-color: #D35B47; color: #FFFFFF; }

        /* Preset 1: Muted Steel Blue */
        .preset-1 { background-color: #FDFDFD; color: #1A1A1A; border: 1.5px solid #1A1A1A; }
        .preset-1.checked { background-color: #4A6B82; color: #FFFFFF; }

        /* Preset 2: Muted Ochre Yellow (Rich deep amber gold, ensures perfect readability with white text) */
        .preset-2 { background-color: #FDFDFD; color: #1A1A1A; border: 1.5px solid #1A1A1A; }
        .preset-2.checked { background-color: #CA8A04; color: #FFFFFF; }

        /* Preset 3: Deep Mineral Charcoal */
        .preset-3 { background-color: #FDFDFD; color: #1A1A1A; border: 1.5px solid #1A1A1A; }
        .preset-3.checked { background-color: #2F3E46; color: #FFFFFF; }

        /* Preset 4: Muted Sage Green */
        .preset-4 { background-color: #FDFDFD; color: #1A1A1A; border: 1.5px solid #1A1A1A; }
        .preset-4.checked { background-color: #6B8E23; color: #FFFFFF; }

        /* Preset 5: Oatmeal Gray Warm Neutral */
        .preset-5 { background-color: #FDFDFD; color: #1A1A1A; border: 1.5px solid #1A1A1A; }
        .preset-5.checked { background-color: #9C8B7F; color: #FFFFFF; }

        /* Minimalistic State Ring Indicators */
        .check-ring {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1.5px solid currentColor;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }
        .checked .check-ring {
            background-color: #FDFDFD;
            border-color: #FDFDFD;
            color: #1A1A1A;
        }

        /* Classic soft gray diagonal hatching pattern for Rest Days */
        .pattern-rest {
            background-color: #F5F4EE;
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 5px,
                #DEDCD5 5px,
                #DEDCD5 7px
            );
        }
    </style>
</head>

        // Global Toast Notification Utilities
        function triggerToast(text) {
            const el = document.getElementById('toastNotification');
            if (el) {

                el.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-4');
                el.classList.add('opacity-100', 'translate-y-0');
                if (window.toastTimeout) clearTimeout(window.toastTimeout);
                window.toastTimeout = setTimeout(hideToast, 2500);
            }
        }

        function hideToast() {
            const el = document.getElementById('toastNotification');

        // Standardized utility to check if a specific date is a rest day (evaluates exceptions)
        function getToday() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function isRestDay(dateStr) {
            if (state.customWorkDates.includes(dateStr)) return false;
            if (state.customRestDates.includes(dateStr)) return true;
            const dateObj = new Date(dateStr);
            const dayOfWeek = dateObj.getDay();
            return state.restDays.includes(dayOfWeek);
        }

        function toggleCalendarDateRestStatus(dateStr) {
            const wasRest = isRestDay(dateStr);
            const dateObj = new Date(dateStr);
            const dayOfWeek = dateObj.getDay();
            const isRecurringRest = state.restDays.includes(dayOfWeek);

            if (wasRest) {
                if (isRecurringRest) {
                    if (!state.customWorkDates.includes(dateStr)) {
                        state.customWorkDates.push(dateStr);
                    }
                }
                state.customRestDates = state.customRestDates.filter(d => d !== dateStr);
                triggerToast(state.lang === 'zh' ? `已动态变更为工作打卡日：${dateStr}` : `Set as Work Check-in Day: ${dateStr}`);
            } else {
                if (isRecurringRest) {
                    state.customWorkDates = state.customWorkDates.filter(d => d !== dateStr);
                } else {
                    if (!state.customRestDates.includes(dateStr)) {
                        state.customRestDates.push(dateStr);
                    }
                }
                triggerToast(state.lang === 'zh' ? `已动态设置为豁免休息日：${dateStr}` : `Set as Exempt Rest Day: ${dateStr}`);
            }
            sync();
            render();

            const annualModal = document.getElementById('annualModal');
            if (annualModal && !annualModal.classList.contains('hidden')) {
                showAnnualOverview();
            }
        }

        // Filtering visible periods with collapsed empty row algorithm
        function getVisiblePeriods(kidId) {
            const kidSchedule = state.schedule.filter(s => s.kidId === kidId);
            const periods = state.periodTimes;
            
            const periodStatus = periods.map(p => {
                const hasClass = kidSchedule.some(s => s.period === p.num);
                return { period: p, isEmpty: !hasClass };
            });

            const visible = [];
            let prevWasEmpty = false;

            periodStatus.forEach((status) => {
                if (status.isEmpty) {
                    if (!prevWasEmpty) {
                        visible.push(status.period);
                        prevWasEmpty = true;
                    }
                } else {
                    visible.push(status.period);
                    prevWasEmpty = false;
                }
            });

            return visible;
        }

        // Export State to a standard local JSON file
        function exportData() {
            try {
                const backupData = {
                    profiles: state.profiles,
                    activities: state.activities,
                    logs: state.logs,
                    rewards: state.rewards,
                    schedule: state.schedule,
                    periodTimes: state.periodTimes,
                    restDays: state.restDays,
                    customRestDates: state.customRestDates,
                    customWorkDates: state.customWorkDates,
                    lang: state.lang
                };
                const jsonString = JSON.stringify(backupData, null, 2);
                const blob = new Blob([jsonString], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `daily_grow_backup_${getToday()}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                triggerToast(state.lang === 'zh' ? "备份文件导出成功！" : "Data exported successfully!");
            } catch (e) {
                triggerToast(state.lang === 'zh' ? "导出失败：" + e.message : "Export failed: " + e.message);
            }
        }

        // Parse and restore state structures securely
        function handleImportFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    // Simple sanity validation checks
                    if (importedData && typeof importedData === 'object') {
                        if (importedData.profiles && Array.isArray(importedData.profiles)) state.profiles = importedData.profiles;
                        if (importedData.activities && Array.isArray(importedData.activities)) state.activities = importedData.activities;
                        if (importedData.logs && Array.isArray(importedData.logs)) state.logs = importedData.logs;
                        if (importedData.rewards && Array.isArray(importedData.rewards)) state.rewards = importedData.rewards;
                        if (importedData.schedule && Array.isArray(importedData.schedule)) state.schedule = importedData.schedule;
                        if (importedData.periodTimes && Array.isArray(importedData.periodTimes)) state.periodTimes = importedData.periodTimes;
                        if (importedData.restDays && Array.isArray(importedData.restDays)) state.restDays = importedData.restDays;
                        if (importedData.customRestDates && Array.isArray(importedData.customRestDates)) state.customRestDates = importedData.customRestDates;
                        if (importedData.customWorkDates && Array.isArray(importedData.customWorkDates)) state.customWorkDates = importedData.customWorkDates;
                        if (importedData.lang) state.lang = importedData.lang;

                        sync();
                        tabSwitch(state.tab); // Triggers full view rebuild & state synchronization
                        triggerToast(t('importSuccess'));
                    } else {
                        throw new Error("Invalid structure");
                    }
                } catch (err) {
                    triggerToast(t('importError'));
                }
                event.target.value = ''; // clears cache
            };
            reader.readAsText(file);
        }

                        </div>
                    `;
                } else if(f.type === 'select') {
                    let opts = '';
                    f.options.forEach(o => {
                        const selected = (f.defaultValue !== undefined && String(o.value) === String(f.defaultValue)) ? 'selected' : '';
                        opts += `<option value="${o.value}" ${selected}>${o.label}</option>`;
                    });
                    container.innerHTML += `

                        </div>
                    `;
                }
            });

            modal.classList.remove('hidden');

            const confirmBtn = document.getElementById('modalConfirmBtn');
            const cancelBtn = document.getElementById('modalCancelBtn');

            const handleConfirm = () => {
                let data = {};
                fields.forEach(f => {
                    const el = document.getElementById(`modal_field_${f.id}`);
                    data[f.id] = el ? el.value : '';
                });
                modal.classList.add('hidden');
                cleanup();
                onConfirm(data);
            };

            const handleCancel = () => {
                modal.classList.add('hidden');
                cleanup();
            };

            function cleanup() {
                confirmBtn.removeEventListener('click', handleConfirm);
                cancelBtn.removeEventListener('click', handleCancel);
            }

            confirmBtn.addEventListener('click', handleConfirm);
            cancelBtn.addEventListener('click', handleCancel);
        }

        // Standardized utility to generate the calendar days representing the current week bounds
        function getCurrentWeekDates() {
            const current = new Date();
            const week = [];
            const day = current.getDay();
            const diff = current.getDate() - day + (day === 0 ? -6 : 1);
            const monday = new Date(current.setDate(diff));
            
            for (let i = 0; i < 7; i++) {
                const nextDay = new Date(monday);
                nextDay.setDate(monday.getDate() + i);
                const year = nextDay.getFullYear();
                const month = String(nextDay.getMonth() + 1).padStart(2, '0');
                const dayStr = String(nextDay.getDate()).padStart(2, '0');
                week.push(`${year}-${month}-${dayStr}`);
            }
            return week;
        }

        // Show standard annual growth milestone overview card popup 
        function showAnnualOverview() {
            const kid = state.profiles.find(p => p.id === state.activeKidId) || state.profiles[0];
            if (!kid) return;

            const currentYear = new Date().getFullYear();
            const kidActs = state.activities.filter(a => a.kidId === kid.id);
            const totalActsCount = kidActs.length;

            const monthsFull = state.lang === 'zh' ? [
                '一月', '二月', '三月', '四月', '五月', '六月',
                '七月', '八月', '九月', '十月', '十一月', '十二月'
            ] : [
                'January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'
            ];

            let annualHtml = '';

            for (let m = 0; m < 12; m++) {
                const daysInMonth = new Date(currentYear, m + 1, 0).getDate();
                const firstDayIndex = new Date(currentYear, m, 1).getDay();
                const calendarOffset = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

                let dayGridHtml = '';

                for (let offset = 0; offset < calendarOffset; offset++) {
                    dayGridHtml += `<div class="aspect-square rounded-none bg-[#F5F4EE] border border-neutral-200/50"></div>`;
                }

                for (let day = 1; day <= daysInMonth; day++) {
                    const dateString = `${currentYear}-${String(m + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const doneOnDay = state.logs.filter(l => l.kidId === kid.id && l.date === dateString).length;

                    const isExempt = isRestDay(dateString);

                    let bgClass = 'bg-white border border-neutral-200 text-neutral-800';

                    if (isExempt) {
                        bgClass = 'pattern-rest border border-neutral-300 text-neutral-400';
                    } else if (doneOnDay > 0 && doneOnDay < totalActsCount) {
                        bgClass = 'bg-[#E2AC4B]/10 border border-[#E2AC4B] text-[#E2AC4B]';
                    } else if (doneOnDay > 0 && doneOnDay >= totalActsCount) {
                        bgClass = 'bg-[#D35B47] border border-[#D35B47] text-white';
                    }

                    dayGridHtml += `
                        <div onclick="toggleCalendarDateRestStatus('${dateString}')" class="aspect-square rounded-none ${bgClass} flex items-center justify-center relative text-[10px] font-bold num-font cursor-pointer" title="Click to toggle Rest status: ${dateString}">
                            <span>${day}</span>
                        </div>
                    `;
                }

                annualHtml += `
                    <div class="bg-white rounded-none border border-[#1A1A1A] p-2.5 shadow-[2px_2px_0px_0px_#1A1A1A] flex flex-col justify-between">
                        <h5 class="font-bold text-neutral-800 text-[10px] tracking-wider uppercase mb-1.5 border-b border-neutral-100 pb-1 font-accent">${monthsFull[m].substring(0,3)}</h5>
                        <div class="grid grid-cols-7 gap-0.5 text-center text-[8px] font-bold text-slate-400 mb-1 font-accent">
                            <div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div>
                        </div>
                        <div class="grid grid-cols-7 gap-0.5">
                            ${dayGridHtml}
                        </div>
                    </div>
                `;
            }

            document.getElementById('annualGridContainer').innerHTML = annualHtml;
            document.getElementById('annualModal').classList.remove('hidden');
        }

                        <div class="flex justify-between items-center py-3 border-b border-neutral-100 last:border-0 text-xs">
                            <span class="font-bold text-[#1A1A1A] uppercase font-accent">${p.code} • ${p.name}</span>
                            <div class="flex gap-4">
                                <button onclick="parentVerifyAndPerform(() => editKid('${p.id}'))" class="text-blue-700 font-bold text-xs hover:underline uppercase">${t('edit')}</button>
                                <button onclick="parentVerifyAndPerform(() => removeKid('${p.id}'))" class="text-[#D35B47] font-bold text-xs hover:underline uppercase">${t('delete')}</button>
                            </div>
                        </div>
                    `;
                });

                let actRowsHtml = '';
                const kidActs = state.activities.filter(a => a.kidId === kid.id);
                const themesText = ["Red", "Sage Blue", "Yellow", "Midnight", "Grey", "Off-White"];
                kidActs.forEach(a => {
                    actRowsHtml += `
                        <div class="flex justify-between items-center py-3 border-b border-neutral-100 last:border-0 text-xs">
                            <span class="font-bold text-[#1A1A1A] uppercase">${a.title} (${themesText[a.preset]})</span>
                            <div class="flex gap-4">
                                <button onclick="parentVerifyAndPerform(() => editAct('${a.id}'))" class="text-blue-700 font-bold text-xs hover:underline uppercase">${t('edit')}</button>
                                <button onclick="parentVerifyAndPerform(() => removeAct('${a.id}'))" class="text-[#D35B47] font-bold text-xs hover:underline uppercase">${t('delete')}</button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = `
                    <div class="max-w-4xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-6 pb-12">
                        
                        <!-- Combined & Compressed System Utilities Panel (Compact Design) -->
                        <div class="bg-white rounded-none p-4 border border-[#1A1A1A] shadow-[2px_2px_0px_0px_#1A1A1A] flex flex-col gap-3 col-span-1 lg:col-span-2">
                            <div class="flex items-center justify-between border-b border-neutral-100 pb-2">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest font-mono">System Preferences / 全局控制台</span>
                                <span class="text-[10px] bg-[#1A1A1A] text-white px-2 py-0.5 font-bold uppercase font-accent leading-none">Utility</span>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-1">
                                <!-- Compact Language Selector Column -->
                                <div class="flex flex-col gap-1.5">
                                    <div class="flex justify-between items-center text-[11px] font-bold text-neutral-500 uppercase">
                                        <span>${t('langSub')}</span>
                                        <span class="opacity-40">Language</span>
                                    </div>
                                    <div class="flex gap-1.5">
                                        <button onclick="toggleLanguage('en')" class="flex-1 card-tap border border-[#1A1A1A] py-1 text-xs font-bold uppercase rounded-none ${state.lang === 'en' ? 'bg-[#4A6B82] text-white border-[#4A6B82]' : 'bg-white text-black hover:bg-slate-50'}">
                                            ${t('enButton')}
                                        </button>
                                        <button onclick="toggleLanguage('zh')" class="flex-1 card-tap border border-[#1A1A1A] py-1 text-xs font-bold uppercase rounded-none ${state.lang === 'zh' ? 'bg-[#4A6B82] text-white border-[#4A6B82]' : 'bg-white text-black hover:bg-slate-50'}">
                                            ${t('zhButton')}
                                        </button>
                                    </div>
                                </div>

                                <!-- Compact Data Portability Column -->
                                <div class="flex flex-col gap-1.5">
                                    <div class="flex justify-between items-center text-[11px] font-bold text-neutral-500 uppercase">
                                        <span>${t('dataBackupSubShort')}</span>
                                        <span class="opacity-40">Backup</span>
                                    </div>
                                    <div class="flex gap-1.5">
                                        <button onclick="exportData()" class="flex-1 card-tap bg-white hover:bg-slate-50 text-black border border-[#1A1A1A] py-1 text-xs font-bold uppercase rounded-none">
                                            ${t('exportBtn')}
                                        </button>
                                        <button onclick="triggerImport()" class="flex-1 card-tap bg-[#4A6B82] text-white border border-[#4A6B82] py-1 text-xs font-bold uppercase rounded-none">
                                            ${t('importBtn')}
                                        </button>
                                        <!-- Hidden Native File Input -->
                                        <input type="file" id="importFileInput" class="hidden" accept=".json" onchange="handleImportFile(event)">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Kid Profiles Config -->
                        <div class="bg-white rounded-none p-5 border border-[#1A1A1A] shadow-[3px_3px_0px_0px_#1A1A1A] flex flex-col justify-between">
                            <div>
                                <h4 class="font-bold text-black text-xs tracking-wider border-b-2 border-neutral-100 pb-3 mb-3 flex justify-between items-center uppercase font-mono">
                                    <span>${t('profiles')}</span>
                                    <span class="num-font text-[9px] bg-[#1A1A1A] text-white px-2.5 py-0.5 font-bold font-accent">${state.profiles.length} ${t('kidsCount')}</span>
                                </h4>
                                <div class="space-y-1">${kidRowsHtml || '<p class="text-[10px] text-slate-400 uppercase font-mono">' + t('noActiveProfile') + '</p>'}</div>
                            </div>
                            
                            <div class="flex flex-col gap-2 mt-4 pt-4 border-t-2 border-neutral-100">
                                <span class="text-[9px] text-slate-400 tracking-wider font-bold uppercase font-mono">${t('addNewProfile')}</span>
                                <div class="flex gap-2">
                                    <input type="text" id="addKidInput" class="flex-1 bg-white border border-[#1A1A1A] rounded-none px-3 py-2 text-xs font-bold outline-none focus:border-black transition-all font-bold" placeholder="${t('enterName')}">
                                    <input type="text" id="addCodeInput" class="w-14 bg-white border border-[#1A1A1A] rounded-none px-2 text-center text-xs font-bold outline-none focus:border-black uppercase font-accent" placeholder="PL" maxlength="2">
                                    <button onclick="addNewProfile()" class="card-tap bg-[#1A1A1A] text-white text-xs px-4 rounded-none font-bold uppercase border border-[#1A1A1A] font-accent">${t('add')}</button>
                                </div>
                            </div>
                        </div>

                        <!-- Habit/Challenges Config -->
                        <div class="bg-white rounded-none p-5 border border-[#1A1A1A] shadow-[3px_3px_0px_0px_#1A1A1A] flex flex-col justify-between">
                            <div>
                                <h4 class="font-bold text-[#1A1A1A] text-xs tracking-wider border-b-2 border-neutral-100 pb-3 mb-3 flex justify-between items-center uppercase font-mono">
                                    <span>${t('habitSettings')}</span>
                                    <span class="text-[9px] bg-[#1A1A1A] text-white px-2.5 py-0.5 font-bold uppercase font-accent">${t('kidLabel')}: ${(kid||{name:'None'}).name}</span>
                                </h4>
                                <div class="space-y-1">${actRowsHtml || '<p class="text-[10px] text-slate-400 uppercase font-mono">' + t('noHabits') + '</p>'}</div>
                            </div>
                            
                            <div class="flex flex-col gap-2 mt-4 pt-4 border-t-2 border-neutral-100">
                                <span class="text-[9px] text-slate-400 tracking-wider font-bold uppercase font-mono">${t('createHabit')}</span>
                                <div class="flex gap-2">
                                    <input type="text" id="addActInput" class="flex-1 bg-white border border-[#1A1A1A] rounded-none px-3.5 py-2.5 text-xs font-bold outline-none focus:border-black transition-all font-bold" placeholder="${t('enterHabitTitle')}">
                                    <select id="addPresetSelect" class="bg-white border border-[#1A1A1A] rounded-none px-2 text-xs font-bold outline-none focus:border-black font-accent">
                                        <option value="0">${state.lang === 'zh' ? '绯红' : 'Terracotta Red'}</option>
                                        <option value="1">${state.lang === 'zh' ? '湛蓝' : 'Steel Blue'}</option>
                                        <option value="2">${state.lang === 'zh' ? '藤黄' : 'Ochre Yellow'}</option>
                                        <option value="3">${state.lang === 'zh' ? '矿灰' : 'Mineral Charcoal'}</option>
                                        <option value="4">${state.lang === 'zh' ? '艾绿' : 'Sage Green'}</option>
                                        <option value="5">${state.lang === 'zh' ? '燕麦' : 'Oatmeal Gray'}</option>
                                    </select>
                                    <button onclick="addNewHabit()" class="card-tap bg-[#1A1A1A] text-white text-xs px-4 rounded-none font-bold uppercase border border-[#1A1A1A] font-accent">${t('add')}</button>
                                </div>
                            </div>
                        </div>

                    </div>
                `;
            }
        }

        function parentVerifyAndPerform(callback) {
            const num1 = Math.floor(Math.random() * 5 + 4);
            const num2 = Math.floor(Math.random() * 5 + 3);
            lockState.answer = num1 * num2; // required to be multiplication as per PRD formula
            lockState.successCallback = callback;

            showModal(t('securityLock'), t('securitySub'), [
                { id: 'ans', type: 'number', placeholder: `${num1} * ${num2} = ?` }
            ], (res) => {
                if(parseInt(res.ans) === lockState.answer) {
                    callback();
                } else {
                    triggerToast("Security Check Failed.");
                }
            });
        }

        function rotateKid() {
            const idx = state.profiles.findIndex(p => p.id === state.activeKidId);
            const nextIdx = (idx + 1) % state.profiles.length;
            state.activeKidId = state.profiles[nextIdx].id;
            sync();
            render();
            triggerToast(state.lang === 'zh' ? `已切换当前操作宝贝：${state.profiles[nextIdx].name}` : `Switched Profile To: ${state.profiles[nextIdx].name}`);
        }

        function switchMobileScheduleDay(dayNum) {
            state.activeScheduleMobileDay = dayNum;
            render();
        }

        function toggleHabit(actId) {
            const today = getToday();
            const logIdx = state.logs.findIndex(l => l.kidId === state.activeKidId && l.actId === actId && l.date === today);

            if(logIdx > -1) {
                state.logs.splice(logIdx, 1);
            } else {
                state.logs.push({ id: 'log_' + Date.now(), kidId: state.activeKidId, actId, date: today });
            }
            sync();
            render();
        }

        function toggleBatchEditMode() {
            state.batchEditMode = !state.batchEditMode;
            state.selectedSlots = []; // Clear current selections
            render();
            triggerToast(state.batchEditMode ? (state.lang === 'zh' ? "批量编辑多选已启动" : "Batch Selection Mode Activated") : (state.lang === 'zh' ? "已退出批量多选" : "Batch Selection Mode Deactivated"));
        }

        // Handle direct tap on schedule slot (Unified router)
        function handleScheduleSlotClick(dayNum, periodNum) {
            if (state.batchEditMode) {
                const slotKey = `${dayNum}-${periodNum}`;
                const idx = state.selectedSlots.indexOf(slotKey);
                if (idx > -1) {
                    state.selectedSlots.splice(idx, 1);
                } else {
                    state.selectedSlots.push(slotKey);
                }
                render();
            } else {
                editScheduleSlot(dayNum, periodNum);
            }
        }

        // Apply bulk class changes to all selected boxes directly from inline dashboard fields
        function applyBatchClassPromptFromInput() {
            const kid = state.profiles.find(p => p.id === state.activeKidId);
            if (!kid || state.selectedSlots.length === 0) return;

            const subjectInput = document.getElementById('batchSubjectInput');
            const presetSelect = document.getElementById('batchPresetSelect');
            if (!subjectInput || !presetSelect) return;

            const subject = subjectInput.value.trim();
            const presetVal = parseInt(presetSelect.value);

            if (!subject) {
                triggerToast(state.lang === 'zh' ? "课程名称不能为空" : "Subject cannot be left blank.");
                return;
            }

            state.selectedSlots.forEach(slot => {
                const [dStr, pStr] = slot.split('-');
                const day = parseInt(dStr);
                const period = parseInt(pStr);

                state.schedule = state.schedule.filter(s => !(s.kidId === kid.id && s.day === day && s.period === period));

                state.schedule.push({
                    id: 'sch_' + Date.now() + '_' + Math.random().toString(36).substr(2, 4),
                    kidId: kid.id,
                    day: day,
                    period: period,
                    subject: subject,
                    preset: presetVal
                });
            });

            state.batchEditMode = false;
            state.selectedSlots = [];
            sync();
            render();
            triggerToast(state.lang === 'zh' ? "已成功批量安排所选课程！" : "Successfully updated selected classes.");
        }

        // Clear bulk class slots
        function clearBatchSlotsPrompt() {
            const kid = state.profiles.find(p => p.id === state.activeKidId);
            if (!kid || state.selectedSlots.length === 0) return;

            state.selectedSlots.forEach(slot => {
                const [dStr, pStr] = slot.split('-');
                const day = parseInt(dStr);
                const period = parseInt(pStr);

                state.schedule = state.schedule.filter(s => !(s.kidId === kid.id && s.day === day && s.period === period));
            });

            state.batchEditMode = false;
            state.selectedSlots = [];
            sync();
            render();
            triggerToast(state.lang === 'zh' ? "已批量清除所选排课格子。" : "Successfully cleared selected class blocks.");
        }

        function editPeriodHeader(num) {
            const pt = state.periodTimes.find(x => x.num === num);
            if (!pt) return;

            showModal(t('editPeriodTitle'), `${t('editPeriodSub')}${num}:`, [
                { id: 'name', type: 'text', placeholder: 'Period Label', defaultValue: pt.name },
                { id: 'range', type: 'text', placeholder: 'Time Range', defaultValue: pt.range }
            ], (res) => {
                const nameStr = res.name.trim();
                const rangeStr = res.range.trim();

                if (!nameStr || !rangeStr) {
                    triggerToast(state.lang === 'zh' ? "输入不能为空" : "Inputs cannot be left empty.");
                    return;
                }

                pt.name = nameStr;
                pt.range = rangeStr;
                sync();
                render();
                triggerToast(state.lang === 'zh' ? "课时时段更新成功！" : "Session details updated successfully.");
            });
        }

        function editScheduleSlot(dayNum, periodNum) {
            const kid = state.profiles.find(p => p.id === state.activeKidId);
            if (!kid) return;

            const existingClass = state.schedule.find(s => s.kidId === kid.id && s.day === dayNum && s.period === periodNum);
            
            showModal(t('editClassTitle'), `${t('editClassSub')}${dayNum} - Period ${periodNum}:`, [
                { id: 'subject', type: 'text', placeholder: t('subjectPlaceholder'), defaultValue: existingClass ? existingClass.subject : '' },
                { id: 'preset', type: 'select', label: state.lang === 'zh' ? '课程配色彩系' : 'Theme Color Preset', defaultValue: existingClass ? existingClass.preset : 1, options: [
                    { value: '0', label: 'Red' },
                    { value: '1', label: 'Blue' },
                    { value: '2', label: 'Yellow' },
                    { value: '3', label: 'Black' },
                    { value: '4', label: 'Grey' },
                    { value: '5', label: 'Off-White' }
                ]},
                { id: 'syncToHabit', type: 'select', label: t('syncToHabitLabel'), defaultValue: '0', options: [
                    { value: '0', label: t('syncNo') },
                    { value: '1', label: t('syncYes') }
                ]}
            ], (res) => {
                const subject = res.subject.trim();
                const presetVal = parseInt(res.preset);
                const syncToHabit = res.syncToHabit === '1';

                state.schedule = state.schedule.filter(s => !(s.kidId === kid.id && s.day === dayNum && s.period === periodNum));

                if (subject) {
                    state.schedule.push({
                        id: 'sch_' + Date.now(),
                        kidId: kid.id,
                        day: dayNum,
                        period: periodNum,
                        subject: subject,
                        preset: presetVal
                    });

                    let toastMsg = state.lang === 'zh' ? `排课成功：${subject}` : `Successfully assigned ${subject}.`;

                    // Handle One-Click Habit Synchronization
                    if (syncToHabit) {
                        const habitExists = state.activities.some(a => a.kidId === kid.id && a.title.toLowerCase() === subject.toLowerCase());
                        if (!habitExists) {
                            state.activities.push({
                                id: 'act_' + Date.now(),
                                kidId: kid.id,
                                title: subject,
                                preset: presetVal
                            });
                            toastMsg += state.lang === 'zh' ? ` 并已同步至每日打卡任务！` : ` and created daily habit!`;
                        } else {
                            toastMsg += state.lang === 'zh' ? `（该打卡任务已存在，无需重复同步）` : ` (Habit already exists)`;
                        }
                    }

                    triggerToast(toastMsg);
                } else {
                    triggerToast(state.lang === 'zh' ? "该时段课程已清除" : "Class schedule slot cleared.");
                }

                sync();
                render();
            });
        }

        function editKid(id) {
            const kid = state.profiles.find(p => p.id === id);
            if(!kid) return;

            showModal(t('editProfileTitle'), t('editProfileSub'), [
                { id: 'name', type: 'text', placeholder: 'Enter name', defaultValue: kid.name },
                { id: 'code', type: 'text', placeholder: 'Code', defaultValue: kid.code }
            ], (res) => {
                const name = res.name.trim();
                const code = res.code.trim().toUpperCase();

                if(!name || !code) {
                    triggerToast(state.lang === 'zh' ? "必填项不能为空。" : "Required fields cannot be empty.");
                    return;
                }

                kid.name = name;
                kid.code = code.substring(0, 2);
                sync();
                render();
                triggerToast(state.lang === 'zh' ? "宝贝档案已更新" : "Profile Details Updated.");
            });
        }

        function editAct(id) {
            const act = state.activities.find(a => a.id === id);
            if (!act) return;

            showModal(t('editHabitTitle'), t('editHabitSub'), [
                { id: 'title', type: 'text', placeholder: 'Habit Title', defaultValue: act.title },
                { id: 'preset', type: 'select', label: 'Theme Color Preset', defaultValue: act.preset, options: [
                    { value: '0', label: 'Red' },
                    { value: '1', label: 'Blue' },
                    { value: '2', label: 'Yellow' },
                    { value: '3', label: 'Black' },
                    { value: '4', label: 'Grey' },
                    { value: '5', label: 'Off-White' }
                ]}
            ], (res) => {
                const title = res.title.trim();
                if (!title) {
                    triggerToast(state.lang === 'zh' ? "习惯名称不能为空" : "Habit Title cannot be empty.");
                    return;
                }
                act.title = title;
                act.preset = parseInt(res.preset);
                sync();
                render();
                triggerToast(state.lang === 'zh' ? "习惯已更新" : "Habit Details Updated.");
            });
        }

        function addNewProfile() {
            const name = document.getElementById('addKidInput').value.trim();
            const code = document.getElementById('addCodeInput').value.trim().toUpperCase();

            if(!name || !code) {
                triggerToast(state.lang === 'zh' ? "输入字段不能为空" : "Required fields cannot be empty.");
                return;
            }

            const newId = 'kid_' + Date.now();
            state.profiles.push({ id: newId, name, code: code.substring(0, 2) });
            state.activeKidId = newId;
            sync();
            render();
            triggerToast(state.lang === 'zh' ? "成功创建新宝贝档案" : "New profile created successfully.");
        }

        function removeKid(id) {
            if(state.profiles.length <= 1) {
                triggerToast(state.lang === 'zh' ? "系统至少需要保留一个宝贝档案" : "System must retain at least one active profile.");
                return;
            }
            state.profiles = state.profiles.filter(p => p.id !== id);
            state.activities = state.activities.filter(a => a.kidId !== id);
            state.logs = state.logs.filter(l => l.kidId !== id);
            state.rewards = state.rewards.filter(b => b.kidId !== id);
            state.schedule = state.schedule.filter(s => s.kidId !== id);
            sync();
            render();
            triggerToast(state.lang === 'zh' ? "档案已成功移除" : "Profile successfully removed.");
        }

        function addNewHabit() {
            const title = document.getElementById('addActInput').value.trim();
            const presetVal = parseInt(document.getElementById('addPresetSelect').value);

            if(!title) {
                triggerToast(state.lang === 'zh' ? "习惯名目必填" : "Habit title is required.");
                return;
            }

            state.activities.push({
                id: 'act_' + Date.now(),
                kidId: state.activeKidId,
                title,
                preset: presetVal
            });
            sync();
            render();
            triggerToast(state.lang === 'zh' ? "习惯已成功添加" : "New habit successfully added.");
        }

        function removeAct(id) {
            state.activities = state.activities.filter(a => a.id !== id);
            state.logs = state.logs.filter(l => l.actId !== id);
            sync();
            render();
            triggerToast(state.lang === 'zh' ? "习惯已成功移除" : "Habit successfully deleted.");
        }

        // Initial launch configuration
        window.onload = () => {
            render();
            const dailyLink = Array.from(document.querySelectorAll('.nav-btn-link')).find(el => el.innerText.includes('Daily Grow') || el.innerText.includes('每日打卡'));
            if(dailyLink) dailyLink.classList.add('text-black', 'border-b-2', 'border-[#1A1A1A]');

            const mobileCheckin = document.getElementById('nav-checkin');
            if(mobileCheckin) {
                mobileCheckin.classList.remove('text-slate-400');
                mobileCheckin.classList.add('text-[#1A1A1A]', 'font-bold');
                const indicator = mobileCheckin.querySelector('.active-indicator');
                if (indicator) {
                    indicator.classList.remove('bg-transparent');
                    indicator.classList.add('bg-[#1A1A1A]');
                }
            }
        };
    </script>
</body>
</html>
